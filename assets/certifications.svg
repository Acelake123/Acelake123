<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 750" width="100%" height="100%">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111424" />
      <stop offset="100%" stop-color="#090a10" />
    </linearGradient>

    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="imgClip">
      <rect width="36" height="36" rx="4" />
    </clipPath>
  </defs>

  <style>
    /* Terminal Typography */
    text {
      font-family: 'Fira Code', 'Consolas', 'Courier New', monospace;
      font-size: 14px;
    }
    
    /* Neon Colors */
    .prompt-user { fill: #f7768e; font-weight: bold; }
    .prompt-dir { fill: #7aa2f7; font-weight: bold; }
    .prompt-sym { fill: #89ddff; }
    .cmd { fill: #9ece6a; filter: url(#glowGreen); }
    .sys-msg { fill: #565f89; font-style: italic; }
    .header { fill: #e0af68; font-size: 16px; font-weight: bold; letter-spacing: 1px; }
    .subheader { fill: #bb9af7; font-size: 14px; font-weight: bold; }
    
    /* Card Styles */
    .card-box {
      fill: rgba(26, 27, 38, 0.6);
      stroke: #292e42;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }
    .card-accent { fill: #7aa2f7; }
    .card-title { fill: #c0caf5; font-weight: bold; font-size: 13px; }
    .card-sub { fill: #7dcfff; font-size: 11px; }
    
    /* Hover Effects */
    g:hover .card-box {
      stroke: #7aa2f7;
      fill: rgba(41, 46, 66, 0.8);
    }
    g:hover .card-accent { fill: #9ece6a; }

    /* Sequential Console Output Animation */
    .out {
      opacity: 0;
      animation: print 0.05s forwards;
    }
    @keyframes print {
      to { opacity: 1; }
    }
    
    /* Animation Delays to simulate execution speed */
    .d-1 { animation-delay: 0.4s; }
    .d-2 { animation-delay: 0.8s; }
    .d-3 { animation-delay: 1.0s; }
    .d-4 { animation-delay: 1.2s; }
    .d-5 { animation-delay: 1.5s; }
    .d-6 { animation-delay: 1.7s; }
    .d-7 { animation-delay: 2.0s; }
    .d-8 { animation-delay: 2.2s; }
    .d-9 { animation-delay: 2.5s; }
    .d-10 { animation-delay: 2.7s; }
    .d-11 { animation-delay: 3.1s; }
    .d-12 { animation-delay: 3.3s; }
    .d-13 { animation-delay: 3.8s; }

    /* Blinking Cursor */
    .cursor {
      fill: #c0caf5;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <rect width="100%" height="100%" rx="12" fill="url(#termBg)" stroke="#1f2335" stroke-width="2"/>
  
  <rect width="100%" height="32" rx="12" fill="#16161e" />
  <rect width="100%" height="16" y="16" fill="#16161e" /> <circle cx="24" cy="16" r="6" fill="#f7768e" />
  <circle cx="44" cy="16" r="6" fill="#e0af68" />
  <circle cx="64" cy="16" r="6" fill="#9ece6a" />
